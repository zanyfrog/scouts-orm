services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-scouts}"
      POSTGRES_USER: "${POSTGRES_USER:-scouts}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-scouts}"
    volumes:
      - scouts-orm-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  scouts-orm:
    build: .
    image: scouts-orm:latest
    ports:
      - "${PORT:-4175}:4174"
    environment:
      PORT: 4174
      AUTH_BASE_URL: "${AUTH_BASE_URL:-http://host.docker.internal:3000}"
      INTERNAL_SERVICE_TOKEN: "${INTERNAL_SERVICE_TOKEN:-scouts-internal-service}"
      DATA_STORE: "${DATA_STORE:-csv}"
      DATABASE_URL: "${DATABASE_URL:-}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  scouts-orm-postgres:
